<main class="home-root">

  <!-- Background noise texture overlay -->
  <div class="noise-overlay"></div>

  <!-- Ambient glow blobs -->
  <div class="glow-blob glow-blob--amber"></div>
  <div class="glow-blob glow-blob--warm"></div>

  <div class="home-card">

    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#fbbf24" stroke-width="2"/>
          <path d="M12 20 C12 15, 20 10, 28 15 C28 22, 20 30, 12 20Z" fill="#fbbf24" opacity="0.25"/>
          <circle cx="20" cy="20" r="5" fill="#fbbf24"/>
        </svg>
      </div>
      <h1 class="brand-name">JomMasak</h1>
      <p class="brand-tagline">Resipi tanpa iklan.</p>
    </div>

    <!-- URL Input -->
    <div class="input-group">
      <label for="urlInput" class="input-label">Paste a recipe URL</label>
      <div class="input-wrapper" [class.input-wrapper--error]="error()">
        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <input
          id="urlInput"
          type="url"
          class="url-input"
          [(ngModel)]="url"
          (keydown)="onKeydown($event)"
          placeholder="https://www.seriouseats.com/recipe-name"
          autocomplete="off"
          spellcheck="false"
          [disabled]="loading()"
        />
      </div>

      <!-- Error Message -->
      @if (error()) {
        <div class="error-message" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error() }}
        </div>
      }
    </div>

    <!-- Submit Button -->
    <button
      id="stripButton"
      class="strip-button"
      (click)="onSubmit()"
      [disabled]="loading()"
    >
      @if (loading()) {
        <span class="spinner"></span>
        <span>Parsing&hellip;</span>
      } @else {
        <span>Strip It</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      }
    </button>

    <!-- Footer hint -->
    <p class="home-hint">
      Works with AllRecipes, Simply Recipes, Food Network, and most recipe sites.
    </p>

    <!-- History Section -->
    @if (history.length > 0) {
      <div class="history-section">
        <div class="history-header">
          <h3 class="history-title">Recent Recipes</h3>
        </div>
        <div class="history-list">
          @for (item of history; track item.url) {
            <button class="history-item" (click)="loadFromHistory(item)" [disabled]="loading()">
              <div class="history-thumb-wrap">
                @if (item.image) {
                  <img [src]="item.image" class="history-thumb" alt="" />
                } @else {
                  <div class="history-thumb-placeholder">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M12 20 C12 15, 20 10, 28 15 C28 22, 20 30, 12 20Z" fill="currentColor" opacity="0.2"/>
                    </svg>
                  </div>
                }
              </div>
              <div class="history-info">
                <span class="history-name">{{ item.title }}</span>
                <span class="history-url">{{ item.url }}</span>
              </div>
            </button>
          }
        </div>
      </div>
    }

  </div>

</main>
